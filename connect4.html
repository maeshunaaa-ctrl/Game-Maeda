<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONNECT 4 — GAME ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a28;
    --accent: #f0e040;
    --accent2: #40e0f0;
    --accent3: #f040a0;
    --text: #e8e8f0;
    --muted: #6868a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none;
    z-index: 100;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,224,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,224,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .back-link {
    position: relative;
    z-index: 10;
    align-self: flex-start;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent); }

  .game-title {
    position: relative;
    z-index: 10;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.8rem, 3vw, 1.3rem);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(240,224,64,0.6), 4px 4px 0 rgba(240,224,64,0.15);
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .game-sub {
    position: relative;
    z-index: 10;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.4rem;
    color: var(--accent2);
    letter-spacing: 3px;
    margin-bottom: 1.5rem;
    text-align: center;
    text-shadow: 0 0 8px rgba(64,224,240,0.5);
  }

  .status-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 500px;
    margin-bottom: 0.8rem;
    background: var(--card);
    border: 1px solid rgba(240,224,64,0.15);
    border-radius: 4px;
    padding: 0.6rem 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .status-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(240,224,64,0.4);
  }

  .hint-text {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .board-wrap {
    position: relative;
    z-index: 10;
    background: var(--card);
    border: 1px solid rgba(240,224,64,0.2);
    border-radius: 4px;
    padding: 10px;
    width: 100%;
    max-width: 500px;
  }

  .col-btns {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 5px;
  }
  .col-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    padding: 4px 0;
    transition: color 0.1s, transform 0.1s;
    font-family: 'Press Start 2P', monospace;
  }
  .col-btn:hover { color: var(--accent); transform: translateY(2px); }
  .col-btn:disabled { opacity: 0.15; cursor: not-allowed; transform: none; }

  .board {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    transition: background 0.15s, border-color 0.15s;
  }
  .cell.filled {
    background: rgba(180,180,200,0.2);
    border-color: rgba(200,200,220,0.35);
  }
  .cell.win {
    border-color: var(--accent) !important;
    background: rgba(240,224,64,0.25) !important;
    box-shadow: 0 0 8px rgba(240,224,64,0.4);
  }

  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 8px;
    margin-top: 0.8rem;
    width: 100%;
    max-width: 500px;
  }
  .btn {
    flex: 1;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.4rem;
    color: var(--muted);
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 0.6rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn:hover { color: var(--accent); border-color: rgba(240,224,64,0.4); }

  .log-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 500px;
    margin-top: 0.8rem;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    max-height: 80px;
    overflow-y: auto;
  }
  .log-entry {
    font-size: 0.65rem;
    color: var(--muted);
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.35rem;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">◀ BACK TO ARCADE</a>
<div class="game-title">CONNECT 4</div>
<div class="game-sub">— INVISIBLE PIECES EDITION —</div>

<div class="status-bar">
  <div class="status-text" id="status">P1 TURN</div>
  <div class="hint-text">駒は半透明 — 場所を覚えておいて！</div>
</div>

<div class="board-wrap">
  <div class="col-btns" id="colBtns"></div>
  <div class="board" id="board"></div>
</div>

<div class="controls">
  <button class="btn" onclick="resetGame()">▶ NEW GAME</button>
</div>

<div class="log-wrap" id="log"></div>

<script>
const R=6,C=7;
let board,cur,over,moves;

function init(){
  board=Array.from({length:R},()=>Array(C).fill(0));
  cur=1;over=false;moves=[];
  renderBoard();renderBtns();updateStatus();renderLog();
}

function renderBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const d=document.createElement('div');
    d.className='cell';d.id=`c${r}-${c}`;
    el.appendChild(d);
  }
}

function renderBtns(){
  const el=document.getElementById('colBtns');
  el.innerHTML='';
  for(let c=0;c<C;c++){
    const b=document.createElement('button');
    b.className='col-btn';b.textContent='▼';b.id=`b${c}`;
    b.onclick=()=>drop(c);
    el.appendChild(b);
  }
}

function drop(col){
  if(over)return;
  let row=-1;
  for(let r=R-1;r>=0;r--)if(board[r][col]===0){row=r;break;}
  if(row===-1)return;
  board[row][col]=cur;
  const lbl=String.fromCharCode(65+col);
  moves.unshift(`P${cur}: 列${lbl}  ${R-row}段目`);
  renderLog();
  const cell=document.getElementById(`c${row}-${col}`);
  if(cell)cell.classList.add('filled');
  if(checkWin(row,col)){
    over=true;
    document.getElementById('status').textContent=`P${cur} WIN!!`;
    markWin(row,col);disableAll();return;
  }
  if(board.flat().every(v=>v!==0)){
    over=true;document.getElementById('status').textContent='DRAW!';return;
  }
  cur=cur===1?2:1;
  updateStatus();updateBtns();
}

function updateStatus(){
  if(!over)document.getElementById('status').textContent=`P${cur} TURN`;
}
function updateBtns(){
  for(let c=0;c<C;c++){const b=document.getElementById(`b${c}`);if(b)b.disabled=board[0][c]!==0;}
}
function disableAll(){
  for(let c=0;c<C;c++){const b=document.getElementById(`b${c}`);if(b)b.disabled=true;}
}
function renderLog(){
  const el=document.getElementById('log');
  el.innerHTML='';
  if(!moves.length){el.innerHTML='<div class="log-entry">GAME START</div>';return;}
  moves.forEach(m=>{const d=document.createElement('div');d.className='log-entry';d.textContent=m;el.appendChild(d);});
}
function checkWin(row,col){
  const p=board[row][col];
  for(const [dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    let n=1;
    for(let d=1;d<4;d++){const r2=row+dr*d,c2=col+dc*d;if(r2>=0&&r2<R&&c2>=0&&c2<C&&board[r2][c2]===p)n++;else break;}
    for(let d=1;d<4;d++){const r2=row-dr*d,c2=col-dc*d;if(r2>=0&&r2<R&&c2>=0&&c2<C&&board[r2][c2]===p)n++;else break;}
    if(n>=4)return true;
  }
  return false;
}
function markWin(row,col){
  const p=board[row][col];
  for(const [dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    let cells=[[row,col]];
    for(let d=1;d<4;d++){const r2=row+dr*d,c2=col+dc*d;if(r2>=0&&r2<R&&c2>=0&&c2<C&&board[r2][c2]===p)cells.push([r2,c2]);else break;}
    for(let d=1;d<4;d++){const r2=row-dr*d,c2=col-dc*d;if(r2>=0&&r2<R&&c2>=0&&c2<C&&board[r2][c2]===p)cells.push([r2,c2]);else break;}
    if(cells.length>=4){cells.forEach(([r,c])=>{const el=document.getElementById(`c${r}-${c}`);if(el)el.classList.add('win');});return;}
  }
}
function resetGame(){init();}
init();
</script>
</body>
</html>
