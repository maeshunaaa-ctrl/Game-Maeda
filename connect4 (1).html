<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONNECT 4 — GAME ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #1a1a28;
    --accent: #f0e040;
    --accent2: #40e0f0;
    --accent3: #f040a0;
    --text: #e8e8f0;
    --muted: #6868a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none; z-index: 100;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(240,224,64,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(240,224,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .back-link {
    position: relative; z-index: 10; align-self: flex-start;
    font-family: 'Press Start 2P', monospace; font-size: 0.45rem;
    color: var(--muted); text-decoration: none; letter-spacing: 2px;
    margin-bottom: 1.5rem; transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent); }
  .game-title {
    position: relative; z-index: 10;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.8rem, 3vw, 1.3rem);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(240,224,64,0.6), 4px 4px 0 rgba(240,224,64,0.15);
    margin-bottom: 0.4rem; text-align: center;
  }
  .game-sub {
    position: relative; z-index: 10;
    font-family: 'Press Start 2P', monospace; font-size: 0.4rem;
    color: var(--accent2); letter-spacing: 3px;
    margin-bottom: 1.2rem; text-align: center;
    text-shadow: 0 0 8px rgba(64,224,240,0.5);
  }

  /* SETUP */
  #setup {
    position: relative; z-index: 10;
    width: 100%; max-width: 500px;
    background: var(--card);
    border: 1px solid rgba(240,224,64,0.15);
    border-radius: 4px; padding: 1.2rem;
  }
  .cfg-label {
    font-family: 'Press Start 2P', monospace; font-size: 0.42rem;
    color: var(--muted); letter-spacing: 2px; margin-bottom: 0.6rem;
  }
  .opt-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .opt {
    padding: 6px 18px;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
    font-family: 'Press Start 2P', monospace; font-size: 0.42rem;
    cursor: pointer; color: var(--muted); background: transparent;
    transition: all .15s; letter-spacing: 1px;
  }
  .opt.sel { border-color: var(--accent); color: var(--accent); text-shadow: 0 0 8px rgba(240,224,64,0.4); }
  .start-btn {
    width: 100%; padding: 10px;
    background: var(--accent); color: #0a0a0f;
    border: none; border-radius: 4px;
    font-family: 'Press Start 2P', monospace; font-size: 0.52rem;
    cursor: pointer; letter-spacing: 2px; transition: opacity .15s;
  }
  .start-btn:hover { opacity: .85; }

  /* GAME */
  #game { position: relative; z-index: 10; width: 100%; max-width: 500px; display: none; }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.6rem; background: var(--card);
    border: 1px solid rgba(240,224,64,0.12); border-radius: 4px;
    padding: 0.5rem 0.8rem; gap: 8px; flex-wrap: wrap;
  }
  .status-text {
    font-family: 'Press Start 2P', monospace; font-size: 0.5rem;
    color: var(--accent); text-shadow: 0 0 8px rgba(240,224,64,0.4);
  }
  .timer-wrap { display: flex; align-items: center; gap: 6px; }
  .timer-ring { position: relative; width: 38px; height: 38px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; font-size: 0.45rem; color: var(--text);
  }
  .board-wrap {
    background: var(--card); border: 1px solid rgba(240,224,64,0.18);
    border-radius: 4px; padding: 8px; width: 100%;
  }
  .col-btns { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 4px; }
  .col-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-size: 12px; padding: 3px 0;
    font-family: 'Press Start 2P', monospace;
    transition: color .1s, transform .1s;
  }
  .col-btn:hover { color: var(--accent); transform: translateY(2px); }
  .col-btn:disabled { opacity: .15; cursor: not-allowed; transform: none; }
  .board { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cell {
    aspect-ratio: 1; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    transition: background .12s;
  }
  .cell.filled { background: rgba(180,180,200,.2); border-color: rgba(200,200,220,.35); }
  .cell.win { border-color: var(--accent) !important; background: rgba(240,224,64,.22) !important; box-shadow: 0 0 8px rgba(240,224,64,.4); }
  .cell.rand { animation: randflash .5s ease; }
  @keyframes randflash { 0%,100%{background:rgba(240,64,160,.35)} 50%{background:rgba(240,64,160,.6)} }
  .controls { display: flex; gap: 8px; margin-top: 8px; }
  .btn {
    flex: 1; font-family: 'Press Start 2P', monospace; font-size: 0.38rem;
    color: var(--muted); background: var(--card);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 4px;
    padding: 7px; cursor: pointer; letter-spacing: 1px;
    transition: color .15s, border-color .15s;
  }
  .btn:hover { color: var(--accent); border-color: rgba(240,224,64,0.35); }
  .log-wrap {
    margin-top: 8px; background: var(--card);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 4px;
    padding: 6px 8px; max-height: 72px; overflow-y: auto;
  }
  .log-entry {
    font-family: 'Press Start 2P', monospace; font-size: 0.32rem;
    color: var(--muted); padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04); letter-spacing: 1px;
  }
  .log-entry.warn { color: var(--accent3); }
</style>
</head>
<body>

<a href="index.html" class="back-link">◀ BACK TO ARCADE</a>
<div class="game-title">CONNECT 4</div>
<div class="game-sub">— INVISIBLE PIECES EDITION —</div>

<div id="setup">
  <div class="cfg-label">TIME LIMIT / TURN</div>
  <div class="opt-group" id="time-opts">
    <div class="opt" data-val="10" onclick="selOpt('time',this)">10 SEC</div>
    <div class="opt sel" data-val="20" onclick="selOpt('time',this)">20 SEC</div>
    <div class="opt" data-val="30" onclick="selOpt('time',this)">30 SEC</div>
  </div>
  <div class="cfg-label">ON TIMEOUT</div>
  <div class="opt-group" id="timeout-opts">
    <div class="opt sel" data-val="random" onclick="selOpt('timeout',this)">RANDOM DROP</div>
    <div class="opt" data-val="lose" onclick="selOpt('timeout',this)">PLAYER LOSES</div>
  </div>
  <button class="start-btn" onclick="startGame()">▶ START GAME</button>
</div>

<div id="game">
  <div class="status-bar">
    <div class="status-text" id="status">P1 TURN</div>
    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="38" height="38" viewBox="0 0 38 38">
          <circle cx="19" cy="19" r="15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
          <circle id="ring" cx="19" cy="19" r="15" fill="none" stroke="#40e0f0" stroke-width="3"
            stroke-dasharray="94.25" stroke-dashoffset="0" stroke-linecap="round"
            style="transition:stroke-dashoffset .25s linear,stroke .3s"/>
        </svg>
        <div class="timer-num" id="tnum">20</div>
      </div>
    </div>
  </div>
  <div class="board-wrap">
    <div class="col-btns" id="colBtns"></div>
    <div class="board" id="board"></div>
  </div>
  <div class="controls">
    <button class="btn" onclick="goSetup()">⚙ SETTINGS</button>
    <button class="btn" onclick="resetGame()">▶ NEW GAME</button>
  </div>
  <div class="log-wrap" id="log"></div>
</div>

<script>
const ROWS=6,COLS=7;
let board,cur,over,moves,timerInterval,timeLeft,timeSec,timeoutMode;
let cfg={time:20,timeout:'random'};

function selOpt(group,el){
  document.querySelectorAll(`#${group}-opts .opt`).forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  const v=el.dataset.val;
  cfg[group]=(v==='random'||v==='lose')?v:parseInt(v);
}

function startGame(){
  timeSec=cfg.time; timeoutMode=cfg.timeout;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  initGame();
}

function goSetup(){
  clearInterval(timerInterval);
  document.getElementById('game').style.display='none';
  document.getElementById('setup').style.display='block';
}

function initGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  cur=1;over=false;moves=[];
  renderBoard();renderBtns();updateStatus();renderLog();startTimer();
}

function renderBoard(){
  const el=document.getElementById('board');el.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const d=document.createElement('div');
    d.className='cell';d.id=`c${r}-${c}`;el.appendChild(d);
  }
}

function renderBtns(){
  const el=document.getElementById('colBtns');el.innerHTML='';
  for(let c=0;c<COLS;c++){
    const b=document.createElement('button');
    b.className='col-btn';b.textContent='▼';b.id=`b${c}`;
    b.onclick=()=>drop(c);el.appendChild(b);
  }
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft=timeSec;updateRing();
  timerInterval=setInterval(()=>{
    timeLeft--;updateRing();
    if(timeLeft<=0){clearInterval(timerInterval);onTimeout();}
  },1000);
}

function updateRing(){
  const circ=94.25,frac=timeLeft/timeSec;
  document.getElementById('ring').style.strokeDashoffset=circ*(1-frac);
  document.getElementById('tnum').textContent=Math.max(0,timeLeft);
  const ring=document.getElementById('ring');
  if(frac<=0.33)ring.style.stroke='#f040a0';
  else if(frac<=0.6)ring.style.stroke='#f0e040';
  else ring.style.stroke='#40e0f0';
}

function onTimeout(){
  if(over)return;
  if(timeoutMode==='lose'){
    over=true;
    const w=cur===1?2:1;
    document.getElementById('status').textContent=`P${cur} TIMEOUT → P${w} WIN!!`;
    moves.unshift(`TIMEOUT: P${cur} LOST`);
    renderLog();disableAll();
  } else {
    const cols=[];
    for(let c=0;c<COLS;c++)if(board[0][c]===0)cols.push(c);
    if(!cols.length){over=true;document.getElementById('status').textContent='DRAW!';return;}
    const rc=cols[Math.floor(Math.random()*cols.length)];
    moves.unshift(`TIMEOUT: P${cur} → RANDOM COL ${String.fromCharCode(65+rc)}`);
    dropAt(rc,true);
  }
}

function drop(col){
  if(over)return;
  clearInterval(timerInterval);
  dropAt(col,false);
}

function dropAt(col,isRandom){
  let row=-1;
  for(let r=ROWS-1;r>=0;r--)if(board[r][col]===0){row=r;break;}
  if(row===-1){if(!isRandom)startTimer();return;}
  board[row][col]=cur;
  if(!isRandom)moves.unshift(`P${cur}: COL ${String.fromCharCode(65+col)} ROW ${ROWS-row}`);
  renderLog();
  const cell=document.getElementById(`c${row}-${col}`);
  if(cell){
    cell.classList.add('filled');
    if(isRandom){cell.classList.add('rand');setTimeout(()=>cell.classList.remove('rand'),600);}
  }
  if(checkWin(row,col)){
    over=true;
    document.getElementById('status').textContent=`P${cur} WIN!!`;
    markWin(row,col);disableAll();return;
  }
  if(board.flat().every(v=>v!==0)){over=true;document.getElementById('status').textContent='DRAW!';return;}
  cur=cur===1?2:1;
  updateStatus();updateBtns();startTimer();
}

function updateStatus(){if(!over)document.getElementById('status').textContent=`P${cur} TURN`;}
function updateBtns(){for(let c=0;c<COLS;c++){const b=document.getElementById(`b${c}`);if(b)b.disabled=board[0][c]!==0;}}
function disableAll(){clearInterval(timerInterval);for(let c=0;c<COLS;c++){const b=document.getElementById(`b${c}`);if(b)b.disabled=true;}}

function renderLog(){
  const el=document.getElementById('log');el.innerHTML='';
  if(!moves.length){el.innerHTML='<div class="log-entry">GAME START</div>';return;}
  moves.forEach(m=>{
    const d=document.createElement('div');
    d.className='log-entry'+(m.includes('TIMEOUT')?' warn':'');
    d.textContent=m;el.appendChild(d);
  });
}

function checkWin(row,col){
  const p=board[row][col];
  for(const [dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    let n=1;
    for(let d=1;d<4;d++){const r2=row+dr*d,c2=col+dc*d;if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS&&board[r2][c2]===p)n++;else break;}
    for(let d=1;d<4;d++){const r2=row-dr*d,c2=col-dc*d;if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS&&board[r2][c2]===p)n++;else break;}
    if(n>=4)return true;
  }
  return false;
}

function markWin(row,col){
  const p=board[row][col];
  for(const [dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    let cells=[[row,col]];
    for(let d=1;d<4;d++){const r2=row+dr*d,c2=col+dc*d;if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS&&board[r2][c2]===p)cells.push([r2,c2]);else break;}
    for(let d=1;d<4;d++){const r2=row-dr*d,c2=col-dc*d;if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS&&board[r2][c2]===p)cells.push([r2,c2]);else break;}
    if(cells.length>=4){cells.forEach(([r,c])=>{const el=document.getElementById(`c${r}-${c}`);if(el)el.classList.add('win');});return;}
  }
}

function resetGame(){clearInterval(timerInterval);initGame();}
</script>
</body>
</html>
